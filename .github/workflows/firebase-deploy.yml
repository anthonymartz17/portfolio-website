name: Deploy to Firebase Hosting on Merge

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Vue app
        run: npm run build
        env:
          VUE_APP_SUPABASE_URL: ${{ secrets.VUE_APP_SUPABASE_URL }}
          VUE_APP_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VUE_APP_SUPABASE_PUBLISHABLE_KEY }}
          VUE_APP_RESUME_URL: ${{ secrets.VUE_APP_RESUME_URL }}

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools deploy --only hosting --project portfolio-2023-166e2 --token "$FIREBASE_TOKEN"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
